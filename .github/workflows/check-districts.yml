name: Sprawdź district_id

on:
  schedule:
    - cron: '0 4 1 * *'  # 1. dnia każdego miesiąca o 4:00 UTC
  workflow_dispatch:        # możliwość ręcznego uruchomienia

jobs:
  check:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - run: pip install requests beautifulsoup4

      - name: Pobierz district_id z OLX i porównaj
        id: update
        run: |
          set +e
          python update_districts.py
          EXIT=$?
          set -e
          if   [ $EXIT -eq 0 ]; then echo "CHANGED=false" >> $GITHUB_ENV
          elif [ $EXIT -eq 1 ]; then echo "CHANGED=true"  >> $GITHUB_ENV
          else
            echo "Skrypt zakończył się błędem (kod $EXIT) — OLX prawdopodobnie zablokował runner."
            exit 1
          fi

      - name: Commit, bump tag, usuń stary release
        if: env.CHANGED == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/mar0ls/olx-monitor.git
          git add olx_scraper.py README.md
          git commit -m "auto: aktualizacja district_id i README"

          # Oblicz nowy tag (bump patch np. v1.2.3 → v1.2.4), znajdź wolny tag
          LAST=$(git tag --sort=-version:refname | head -1)
          if [ -z "$LAST" ]; then
            NEW="v1.0.1"
          else
            v1=$(echo "$LAST" | cut -d. -f1 | sed 's/v//')
            v2=$(echo "$LAST" | cut -d. -f2)
            v3=$(echo "$LAST" | cut -d. -f3)
            while true; do
              v3=$((v3 + 1))
              NEW="v${v1}.${v2}.${v3}"
              # Sprawdź czy tag istnieje zdalnie
              if git ls-remote --tags origin | grep -q "refs/tags/$NEW"; then
                continue
              else
                break
              fi
            done
          fi

          echo "Stary tag: $LAST  →  Nowy tag: $NEW"

          # Usuń poprzedni GitHub Release (bez usuwania tagu git)
          gh release delete "$LAST" --yes 2>/dev/null || true

          git push
          git tag "$NEW"
          git push origin "$NEW"
          # Nowy tag wyzwoli release.yml który zbuduje binarke
          # PAT_TOKEN wymagany — GITHUB_TOKEN nie wyzwala innych workflow
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
