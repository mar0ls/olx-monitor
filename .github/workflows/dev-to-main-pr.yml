name: Dev to Main PR

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]

# Jeśli branch protection wymaga niezależnego reviewera:
# ustaw sekret `AUTO_APPROVE_TOKEN` z PAT konta-bota, które ma dostęp do repo.
# Fallback do `github.token` działa tylko gdy polityka review na to pozwala.
permissions:
  contents: write
  pull-requests: write

jobs:
  create-and-merge-pr:
    if: >
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'dev'
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Utwórz lub znajdź PR dev -> main
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const head = "dev";
            const base = "main";

            core.setOutput("skip", "false");

            const openPrs = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${head}`,
              base,
              per_page: 10,
            });

            let pr = openPrs.data[0];
            if (!pr) {
              try {
                const created = await github.rest.pulls.create({
                  owner,
                  repo,
                  head,
                  base,
                  title: "Auto PR: dev -> main",
                  body: [
                    "Automatyczny PR utworzony po udanym workflow `Tests` na gałęzi `dev`.",
                    "",
                    "- źródło: `dev`",
                    "- cel: `main`",
                    "- merge: auto-merge (squash)",
                  ].join("\n"),
                  maintainer_can_modify: true,
                });
                pr = created.data;
              } catch (error) {
                const noDiff =
                  error?.status === 422 &&
                  String(error?.message || "").includes("No commits between");
                if (noDiff) {
                  core.info("Brak nowych commitów między dev i main - pomijam tworzenie PR.");
                  core.setOutput("skip", "true");
                  return;
                }
                throw error;
              }
            }

            core.setOutput("number", String(pr.number));
            core.setOutput("node_id", pr.node_id);

      - name: Auto-approve PR (bot)
        if: ${{ steps.pr.outputs.skip != 'true' }}
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          github-token: ${{ secrets.AUTO_APPROVE_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pull_number = Number(process.env.PR_NUMBER);
            if (!pull_number) {
              core.setFailed("Brak numeru PR.");
              return;
            }

            try {
              await github.rest.pulls.createReview({
                owner,
                repo,
                pull_number,
                event: "APPROVE",
                body: "Automatyczna aprobata bota po udanym workflow Tests na gałęzi dev.",
              });
              core.info(`PR #${pull_number} został automatycznie zatwierdzony.`);
            } catch (error) {
              core.warning(
                `Auto-approve dla PR #${pull_number} nie powiódł się: ${error.message}`,
              );
            }

      - name: Włącz auto-merge (squash)
        if: ${{ steps.pr.outputs.skip != 'true' }}
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const prNodeId = "${{ steps.pr.outputs.node_id }}";
            if (!prNodeId) {
              core.setFailed("Brak node_id PR.");
              return;
            }

            try {
              await github.graphql(
                `mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(
                    input: {
                      pullRequestId: $pullRequestId
                      mergeMethod: SQUASH
                    }
                  ) {
                    clientMutationId
                  }
                }`,
                { pullRequestId: prNodeId },
              );
              core.info(`Auto-merge włączony dla PR #${process.env.PR_NUMBER}`);
            } catch (error) {
              core.warning(
                `Nie udało się włączyć auto-merge dla PR #${process.env.PR_NUMBER}: ${error.message}`,
              );
            }

      - name: Spróbuj wykonać merge PR (fallback)
        if: ${{ steps.pr.outputs.skip != 'true' }}
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = Number(process.env.PR_NUMBER);
            if (!pull_number) {
              core.setFailed("Brak numeru PR.");
              return;
            }

            try {
              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number,
                merge_method: "squash",
              });
              core.info(`PR #${pull_number} został scalony do main.`);
            } catch (error) {
              core.warning(
                `Merge PR #${pull_number} nie został wykonany w tym kroku (to może być OK, np. oczekiwanie na checki): ${error.message}`,
              );
            }
