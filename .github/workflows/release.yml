name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install requests beautifulsoup4 pytest
      - run: pytest test_olx_scraper.py -v --tb=short

  build:
    name: Build – ${{ matrix.os }}
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: olx-monitor-macos
          - os: ubuntu-latest
            artifact: olx-monitor-linux
          - os: windows-latest
            artifact: olx-monitor-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalacja zależności (Linux – Qt6 libs)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon-x11-0 libegl1 libopengl0

      - name: Instalacja zależności Python
        run: pip install requests beautifulsoup4 PyQt6 pyinstaller Pillow

      - name: Konwertuj ikonę (macOS → .icns)
        if: runner.os == 'macOS'
        run: |
          mkdir -p icon.iconset
          for sz in 16 32 64 128 256 512; do
            sips -z $sz $sz assets/icon.png --out icon.iconset/icon_${sz}x${sz}.png
            sips -z $((sz*2)) $((sz*2)) assets/icon.png --out icon.iconset/icon_${sz}x${sz}@2x.png
          done
          iconutil -c icns icon.iconset -o icon.icns

      - name: Konwertuj ikonę (Linux/Windows → .ico)
        if: runner.os != 'macOS'
        run: python -c "from PIL import Image; Image.open('assets/icon.png').save('icon.ico', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"

      - name: Zbuduj plik wykonywalny (macOS / Linux)
        if: runner.os != 'Windows'
        run: >
          pyinstaller
          --onefile
          --name olx-monitor
          --icon ${{ runner.os == 'macOS' && 'icon.icns' || 'icon.ico' }}
          --hidden-import otodom_scraper
          olx_gui.py

      - name: Zbuduj plik wykonywalny (Windows)
        if: runner.os == 'Windows'
        run: >
          pyinstaller
          --onefile
          --windowed
          --name olx-monitor
          --icon icon.ico
          --hidden-import otodom_scraper
          olx_gui.py

      - name: Zmień nazwę artefaktu
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/olx-monitor.exe "dist/${{ matrix.artifact }}"
          else
            mv dist/olx-monitor "dist/${{ matrix.artifact }}"
          fi

      - name: Wgraj do GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
          generate_release_notes: true
