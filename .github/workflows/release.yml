name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag release, np. v1.0.3"
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install requests beautifulsoup4 pytest
      - run: pytest test_olx_scraper.py -v --tb=short

  build:
    name: Build – ${{ matrix.os }}
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: olx-monitor-macos.zip
          - os: ubuntu-latest
            artifact: olx-monitor-linux
          - os: windows-latest
            artifact: olx-monitor-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalacja zależności (Linux – Qt6 libs)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon-x11-0 libegl1 libopengl0

      - name: Instalacja zależności Python
        run: pip install requests beautifulsoup4 PyQt6 pyinstaller Pillow

      - name: Build release artifact
        shell: bash
        run: bash scripts/build_release.sh

      - name: Wgraj artefakt buildu
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/release/${{ matrix.artifact }}
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz wszystkie artefakty
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: Wgraj do GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          files: |
            dist/release/olx-monitor-macos.zip
            dist/release/olx-monitor-linux
            dist/release/olx-monitor-windows.exe
          generate_release_notes: true
