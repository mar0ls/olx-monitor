name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install requests beautifulsoup4 pytest
      - run: pytest test_olx_scraper.py -v --tb=short

  build:
    name: Build – ${{ matrix.os }}
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: olx-monitor-macos.zip
          - os: ubuntu-latest
            artifact: olx-monitor-linux
          - os: windows-latest
            artifact: olx-monitor-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalacja zależności (Linux – Qt6 libs)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon-x11-0 libegl1 libopengl0

      - name: Instalacja zależności Python
        run: pip install requests beautifulsoup4 PyQt6 pyinstaller Pillow

      - name: Build release artifact
        shell: bash
        run: bash scripts/build_release.sh

      - name: Wgraj do GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/${{ matrix.artifact }}
          generate_release_notes: true
